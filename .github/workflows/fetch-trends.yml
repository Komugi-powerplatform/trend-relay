name: fetch-trends

# Runs at 03:40 JST (18:40 UTC), ~4h before the cloud neta-trend Routine
# (07:40 JST) reads data/latest.json. The old 10-min margin (06:50 vs 07:00)
# lost the race whenever GitHub Actions' scheduler ran late (commonly 30-90
# min), so the Routine read stale/absent data and fell back to thin WebSearch.
# A wide margin absorbs that delay. Also dispatchable for probe/manual runs.
on:
  schedule:
    - cron: "40 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-trends
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch and normalize trend data
        run: node fetch.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "trend-relay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh trends $(date -u +%FT%H:%MZ)"
            git push
          fi
