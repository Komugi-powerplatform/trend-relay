name: fetch-trends

# Runs at 06:50 JST (21:50 UTC), 10 min before the cloud neta-trend Routine
# (07:00 JST) reads data/latest.json. Also dispatchable for probe/manual runs.
on:
  schedule:
    - cron: "50 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-trends
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch and normalize trend data
        run: node fetch.mjs
      - name: Commit refreshed data
        run: |
          git config user.name "trend-relay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh trends $(date -u +%FT%H:%MZ)"
            git push
          fi
